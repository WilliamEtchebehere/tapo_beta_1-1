<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Navegável</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 id="page-title">Página 1</h1>
                <div class="nav-controls">
                    <button id="prev-btn" class="nav-btn" aria-label="Página anterior">
                        ← Anterior
                    </button>
                    <span class="page-indicator">
                        <input type="number" id="page-input" min="1" max="59" value="1" aria-label="Ir para página">
                        <span> / 59</span>
                    </span>
                    <button id="next-btn" class="nav-btn" aria-label="Próxima página">
                        Próxima →
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="content">
            <div id="page-content" class="page-content">
                <!-- Conteúdo das páginas será inserido aqui -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Página <span id="footer-page">1</span> de 59</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
